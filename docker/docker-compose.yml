# adi-local-dev — Local ADI Chain Development Environment
#
# ⚠ Linux / WSL2 only — the Rust ADI node does not run on Windows natively.
#
# What this spins up:
#   - L1: Local Ethereum node (Anvil) with pre-loaded ADI system state
#   - L2: ADI Chain node (zksync-os-server) running with dummy proofs
#         — no real STARK/SNARK proving — fast for local dev
#
# Usage:
#   docker compose up
#
# Then configure your tools for local ADI:
#   RPC URL:  http://localhost:3050
#   Chain ID: (same as testnet: 99999, or check docker logs)
#
# Note: This uses dummy proofs (USE_DUMMY_PROOFS=true).
#       For real proof generation you need the Airbender prover (GPU recommended).
#
# Source: https://github.com/ADI-Foundation-Labs/ADI-Stack-Server

version: "3.8"

services:
  # ── L1: Local Ethereum node pre-loaded with ADI system contracts ─────────────
  l1-anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    platform: linux/amd64
    command: >
      anvil
      --load-state /data/zkos-l1-state.json
      --port 8545
      --host 0.0.0.0
      --block-time 2
      --chain-id 31337
    volumes:
      - ./l1-state:/data
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── L2: ADI Chain node (zksync-os-server) with dummy proofs ─────────────────
  adi-node:
    image: ghcr.io/adi-foundation-labs/adi-stack-server:latest
    platform: linux/amd64
    depends_on:
      l1-anvil:
        condition: service_healthy
    environment:
      # Use fake/dummy proofs — no GPU required for local dev
      USE_DUMMY_PROOFS: "true"
      # L1 node connection
      L1_RPC_URL: "http://l1-anvil:8545"
      # Sequencer configuration
      SEQUENCER_PRIVATE_KEY: "${SEQUENCER_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
    ports:
      - "3050:3050"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3050"]
      interval: 10s
      timeout: 5s
      retries: 15

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  l1-state:
